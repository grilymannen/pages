<svg width="120" height="120" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="white" stroke-width="8"/>

  <!-- Perfect diagonal X touching the circle -->
  <!-- Offset = r / sqrt(2) ≈ 28.28 -->
  <line x1="21.72" y1="21.72" x2="78.28" y2="78.28"
        stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="78.28" y1="21.72" x2="21.72" y2="78.28"
        stroke="white" stroke-width="8" stroke-linecap="round"/>
</svg>